                <a class="navbar-brand" href="#" data-touiteur-goto="home"><span class="glyphicon glyphicon-home"></span>Touiteur</a>

            <div class="pull-right collapse navbar-collapse" id="bs-example-navbar-collapse-1">

                    <li><a href="#" data-touiteur-goto="post"><span class="glyphicon glyphicon-pencil"></span>Post</a></li>
                    <li><a href="#"><span class="glyphicon glyphicon-user"></span>Profile</a></li>

            </div>

    <div class="container hidden-block" id="screen-0">
        <div class="row">
            <div class="col-sm-6 col-md-4 col-md-offset-4">
                <div class="account-wall">
                <h1 class="text-center login-title">Sign in to continue to <span class="text-primary">Touiteur</span></h1>
                    <img class="profile-img" src="img/logo_user.png"
                        alt="">
                    <form class="form-signin" id="touiteur-signin">
                    <div class="text-center">
                        <p class="profile-name hidden-block">User Name</p>
                        <p class="profile-email hidden-block">User@Mail.Com</p>
                        <a href="#" class="new-account hidden-block" data-touiteur-goto="signin_new">Sign in with a different account</a>
                    </div>
                    <input type="text" class="form-control first" placeholder="Login" required name="login">
                    <input type="password" class="form-control last" placeholder="Password" required name="password">
                    <button class="btn btn-lg btn-primary btn-block" type="submit">
                        Sign in</button>
                    <a href="#" class="pull-left new-account" data-touiteur-goto="signup">Create an account </a>
                    <a href="#" class="pull-right need-help">Need help? </a><span class="clearfix"></span>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container hidden-block" id="screen-1">
        <div class="row">
            <div class="col-sm-6 col-md-4 col-md-offset-4">

                    <form class="form-signin" id="touiteur-signup">
                    <input type="text" class="form-control first" placeholder="Login" required name="login">
                    <input type="text" class="form-control" placeholder="Email" required name="mail">
                    <input type="password" class="form-control" placeholder="Password" required name="password">
                    <input type="password" class="form-control last" placeholder="Confirm Password" required name="password_confirm">
                    <button class="btn btn-lg btn-primary btn-block" type="submit">
                        Sign up</button>
                    <a href="#" class="pull-left new-account" data-touiteur-goto="signin">Connect </a>
                    <a href="#" class="pull-right need-help">Need help? </a><span class="clearfix"></span>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container hidden-block" id="screen-3">
        <div class="white-background">&nbsp;</div>
        <form id="touiteur_submit">
            <textarea class="form-control counted" placeholder="Type in your message" rows="3" style="font-size:24px; margin-bottom:10px;" name="touite"></textarea>
            <button class="pull-right btn btn-sm btn-primary" type="submit">
                Submit</button>
            <span class="pull-right btn btn-info btn-sm fileinput-button">
                <i class="glyphicon glyphicon-picture"></i>
                <span>Image</span>
                <!-- The file input field used as target for the file upload widget -->
                <input id="fileupload" type="file" name="image">
            </span>
            <a href="#" class="pull-right btn btn-info btn-sm" id="touite_add_location">
                <i class="glyphicon glyphicon-map-marker"></i>
                <span>Position</span>
            </a>
            <h4 class="pull-right" id="poste_counter">140 characters remaining</h4>
        </form>
        <div class="clearfix"></div>
        <div id="map-container" class="wall-box hidden-block">
            <div id="map"></div>
